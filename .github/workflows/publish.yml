name: Publish Docker Images

# Builds and pushes multi-arch images to Docker Hub after tests pass on main or dev.
# Pushing to main publishes :latest; pushing to dev publishes :dev.
# Trigger manually via workflow_dispatch to publish any custom tag.
#
# Required GitHub secrets:
#   DOCKERHUB_TOKEN   — Docker Hub access token (Account Settings → Security)
#

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g. staging, pr-42). Defaults to latest.'
        required: false
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        include:
          - name: API
            context: ./api
            image: wottle/inventory-api
          - name: Web
            context: ./web
            image: wottle/inventory-web
          - name: Storefront
            context: ./storefront
            image: wottle/inventory-storefront
          - name: MCP Server
            context: ./mcp-server
            image: wottle/inventory-mcp
          - name: Showcase
            context: ./showcase
            image: wottle/inventory-showcase

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: wottle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$INPUT_TAG" >> $GITHUB_OUTPUT
          elif [ "$HEAD_BRANCH" = "dev" ]; then
            echo "value=dev" >> $GITHUB_OUTPUT
          else
            echo "value=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image }}:${{ steps.tag.outputs.value }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

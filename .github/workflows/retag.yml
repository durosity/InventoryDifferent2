name: Retag Docker Images

# Promotes one Docker image tag to another without rebuilding.
# Use to promote :dev to :latest after testing, skipping the multi-arch rebuild.
#
# Required GitHub secrets:
#   DOCKERHUB_TOKEN   — Docker Hub access token (Account Settings → Security)
#

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source tag to promote (e.g. dev)'
        required: true
        default: 'dev'
      target_tag:
        description: 'Target tag (e.g. latest)'
        required: true
        default: 'latest'

jobs:
  retag:
    name: Retag ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: API
            image: wottle/inventory-api
          - name: Web
            image: wottle/inventory-web
          - name: Storefront
            image: wottle/inventory-storefront
          - name: MCP Server
            image: wottle/inventory-mcp
          - name: Showcase
            image: wottle/inventory-showcase

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wottle
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag ${{ matrix.name }}
        env:
          IMAGE: ${{ matrix.image }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          TARGET_TAG: ${{ inputs.target_tag }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$TARGET_TAG" \
            "$IMAGE:$SOURCE_TAG"

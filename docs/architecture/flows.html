<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvDifferent — Architecture & Flows</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', system-ui, sans-serif; }
.brand { font-family: 'Space Grotesk', sans-serif; }

.diagram-bg {
  background: #080808;
  box-shadow: inset 0 0 120px -30px rgba(234,179,8,0.15);
}

/* Package nodes */
.pkg-node {
  position: absolute;
  transform: translate(-50%, -50%);
  background: #18181b;
  border: 1.5px solid #3f3f46;
  border-radius: 10px;
  padding: 8px 14px;
  white-space: nowrap;
  cursor: default;
  z-index: 2;
  transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
}
.pkg-node.state-active {
  border-color: #facc15;
  box-shadow: 0 0 0 2px rgba(250,204,21,0.2), 0 0 18px rgba(250,204,21,0.2);
}
.pkg-node.state-active .pkg-name { color: #fef08a !important; }
.pkg-node.state-dim { opacity: 0.1; }

/* Edge animation */
@keyframes march { to { stroke-dashoffset: -12; } }
.edge-anim { animation: march 0.65s linear infinite; }

/* Step badge */
.step-badge {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #713f12;
  border: 1.5px solid #facc15;
  color: #fef08a;
  font-size: 9px; font-weight: 800;
  display: none;
  align-items: center; justify-content: center;
  pointer-events: none;
  box-shadow: 0 0 10px rgba(250,204,21,0.4);
  z-index: 10;
}

/* Flow list items */
.flow-item { border-radius: 8px; cursor: pointer; transition: background 0.12s; }
.flow-item:hover { background: #27272a; }
.flow-item.selected { background: #713f12; }
.flow-item.selected .flow-name { color: #fef08a; }
.flow-item.selected .flow-path { color: #ca8a04; }

/* Step rows */
.step-row { border-radius: 8px; cursor: pointer; transition: background 0.12s; border-left: 2px solid transparent; }
.step-row:hover { background: #27272a; }
.step-row.active { background: #1c1410; border-left-color: #facc15; }
.step-row.active .step-title { color: #fef08a !important; }
.step-row.active .step-num { background: #facc15 !important; color: #000 !important; border-color: #facc15 !important; }
.step-row.pkg-preview { background: #27272a; }
.step-row.pkg-preview .step-num { border-color: #facc15 !important; color: #fef08a !important; }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100" style="height:100vh;display:flex;flex-direction:column;overflow:hidden;">

<!-- Header -->
<header class="flex-shrink-0 border-b border-zinc-800 px-8 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-yellow-400 text-black rounded-xl flex items-center justify-center text-lg">📦</div>
    <div>
      <h1 class="brand text-xl font-semibold tracking-tight">InvDifferent — Architecture &amp; Flows</h1>
      <p class="text-xs text-zinc-500 mt-0.5">Select a flow to trace execution. Hover packages or steps to preview.</p>
    </div>
  </div>
  <div class="flex gap-5 text-xs text-zinc-500">
    <div class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block;"></span>Client</div>
    <div class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#a855f7;display:inline-block;"></span>Middleware</div>
    <div class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#6366f1;display:inline-block;"></span>API</div>
    <div class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>Storage</div>
  </div>
</header>

<!-- Body -->
<div style="display:flex;flex:1;overflow:hidden;">

  <!-- Diagram -->
  <div style="flex:1;padding:20px;overflow:hidden;">
    <div id="diagram" class="diagram-bg" style="position:relative;height:100%;border-radius:16px;border:1px solid #27272a;">
      <svg id="diagram-svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible;">
        <defs>
          <marker id="arr-default" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#3f3f46"/></marker>
          <marker id="arr-active"  markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#facc15"/></marker>
          <marker id="arr-flow"    markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#52525b"/></marker>
          <marker id="arr-dim"     markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#18181b"/></marker>
        </defs>
      </svg>
      <div id="diagram-nodes" style="position:absolute;inset:0;z-index:2;"></div>
      <div id="step-badge" class="step-badge"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div style="width:310px;border-left:1px solid #27272a;background:#0f0f10;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;">
    <div style="padding:18px;border-bottom:1px solid #27272a;flex-shrink:0;">
      <div style="font-size:10px;font-weight:600;letter-spacing:.1em;color:#52525b;text-transform:uppercase;margin-bottom:10px;">Flows</div>
      <div id="flows-list" style="overflow-y:auto;max-height:42vh;"></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div style="padding:14px 18px;border-bottom:1px solid #27272a;flex-shrink:0;">
        <div style="font-size:10px;font-weight:600;letter-spacing:.1em;color:#52525b;text-transform:uppercase;">Steps</div>
        <div id="flow-title" style="color:#facc15;font-size:13px;font-weight:500;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:18px;"></div>
      </div>
      <div id="steps-list" style="flex:1;overflow-y:auto;padding:14px 18px 32px;">
        <div style="color:#52525b;font-size:12px;font-style:italic;">Select a flow to trace execution.</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Embedded data ──────────────────────────────────────────────────────────────
var DATA = {
  packages: [
    { id:'p-web',        name:'Web',         sub:'Next.js admin',             tier:'client',     x:14, y:12 },
    { id:'p-ios',        name:'iOS',         sub:'SwiftUI',                   tier:'client',     x:34, y:12 },
    { id:'p-storefront', name:'Storefront',  sub:'Next.js shop',              tier:'client',     x:60, y:12 },
    { id:'p-showcase',   name:'Showcase',    sub:'The Archive',               tier:'client',     x:82, y:12 },
    { id:'p-mcp',        name:'MCP Server',  sub:'AI tools / stdio',          tier:'middleware', x:10, y:52 },
    { id:'p-api',        name:'GraphQL API', sub:'Express · Apollo · Prisma', tier:'api',        x:48, y:52 },
    { id:'p-db',         name:'PostgreSQL',  sub:'Prisma ORM',                tier:'storage',    x:34, y:88 },
    { id:'p-uploads',    name:'/uploads',    sub:'file storage',              tier:'storage',    x:62, y:88 }
  ],
  edges: [
    { id:'e-web-api',      from:'p-web',        to:'p-api',     label:'GraphQL / REST' },
    { id:'e-ios-api',      from:'p-ios',        to:'p-api',     label:'GraphQL / REST' },
    { id:'e-store-api',    from:'p-storefront', to:'p-api',     label:'GraphQL' },
    { id:'e-showcase-api', from:'p-showcase',   to:'p-api',     label:'GraphQL' },
    { id:'e-mcp-api',      from:'p-mcp',        to:'p-api',     label:'GraphQL' },
    { id:'e-api-db',       from:'p-api',        to:'p-db',      label:'Prisma ORM' },
    { id:'e-api-uploads',  from:'p-api',        to:'p-uploads', label:'fs / sharp / ffmpeg' }
  ],
  flows: [
    {
      id:'create-device', icon:'📦', name:'Create Device', path:'Web / iOS → API → PostgreSQL',
      steps: [
        { title:'User submits create form', desc:'Apollo Client fires the createDevice GraphQL mutation with a DeviceCreateInput payload. JWT in Authorization header.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'Resolver validates & writes', desc:'createDevice resolver in resolvers.ts calls requireAuth(), then prisma.device.create() with DEVICE_INCLUDE.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Activity log written', desc:'If dateAcquired is set, a DEVICE_ACQUIRED ActivityLog row is inserted. This powers the dashboard activity feed.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Device returned to client', desc:'Full Device object (with relations) returned. Apollo Client writes it to its normalised cache; UI re-renders.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] }
      ]
    },
    {
      id:'edit-device', icon:'✏️', name:'Edit Device', path:'Web / iOS → API → PostgreSQL',
      steps: [
        { title:'User saves changes', desc:'Apollo Client fires updateDevice mutation with a DeviceUpdateInput. Only changed fields are sent.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'Resolver reads current state', desc:'updateDevice resolver reads the existing device (status, functionalStatus, lastPowerOnDate) before applying the update — needed to detect what changed for activity logging.', packages:['p-api'], edges:['e-api-db'] },
        { title:'DB row updated', desc:'prisma.device.update() writes the clean data. Undefined fields are stripped so they don\'t overwrite existing values with null.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Value snapshot created (conditional)', desc:'If estimatedValue changed, a ValueSnapshot row is inserted — but only if the value differs from the last snapshot. Powers the per-device value history chart.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Activity log entries written', desc:'STATUS_CHANGED, FUNCTIONAL_STATUS_CHANGED, or POWERED_ON entries are inserted for each detected change. Powers the dashboard feed.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'delete-device', icon:'🗑️', name:'Delete Device (soft)', path:'Web / iOS → API → PostgreSQL',
      steps: [
        { title:'User clicks Delete', desc:'deleteDevice(id) mutation fired from web Trash page or iOS device detail.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'Resolver sets deleted flag', desc:'prisma.device.update({ data: { deleted: true } }) — device is hidden from all queries but not removed from DB.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'restore-device', icon:'♻️', name:'Restore Device', path:'Web → API → PostgreSQL',
      steps: [
        { title:'User clicks Restore in Trash', desc:'restoreDevice(id) mutation fired from the /trash admin page.', packages:['p-web'], edges:['e-web-api'] },
        { title:'Resolver clears deleted flag', desc:'prisma.device.update({ data: { deleted: false } }). Full device object returned.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'permanently-delete-device', icon:'💥', name:'Permanently Delete Device', path:'Web → API → PostgreSQL + /uploads',
      steps: [
        { title:'User confirms permanent deletion', desc:'permanentlyDeleteDevice(id) mutation fired from the /trash admin page after confirmation dialog.', packages:['p-web'], edges:['e-web-api'] },
        { title:'API collects image paths', desc:'Resolver fetches device with { include: { images: true } } to get all file paths before deletion.', packages:['p-api'], edges:['e-api-db'] },
        { title:'DB cascade delete', desc:'prisma.device.delete() removes the row; Prisma cascades to images, notes, maintenanceTasks, tags, customFieldValues.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Upload files deleted from disk', desc:'Resolver loops over image paths and calls fs.unlinkSync() on each. The device\'s upload directory is then removed.', packages:['p-api'], edges:['e-api-uploads'] }
      ]
    },
    {
      id:'add-photo', icon:'📷', name:'Add Photo', path:'Web / iOS → REST /upload → /uploads → createImage → PostgreSQL',
      steps: [
        { title:'Client selects image file', desc:'Web: file input triggers. iOS: PHPickerViewController presents photo library. Image is held in memory ready to POST.', packages:['p-web','p-ios'], edges:[] },
        { title:'POST /upload (multipart/form-data)', desc:'Client POSTs to /upload?deviceId=X. This is a REST endpoint — not GraphQL — handled by multer (2 GB limit). JWT required.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'File saved to /uploads', desc:'multer writes the file to /uploads/devices/{deviceId}/{uuid}.ext on disk. The path is returned in the JSON response.', packages:['p-api'], edges:['e-api-uploads'] },
        { title:'createImage mutation fired', desc:'Client passes the returned path to createImage GraphQL mutation. Resolver calls generateThumbnailForUpload() — sharp generates a 320×320 WebP thumbnail and saves it alongside the original.', packages:['p-api'], edges:['e-api-uploads'] },
        { title:'Image row saved to DB', desc:'prisma.image.create() writes path, thumbnailPath, dateTaken (from EXIF), isThumbnail, and deviceId. First IMAGE auto-becomes the device thumbnail.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'upload-video', icon:'🎥', name:'Upload Video', path:'Web / iOS → REST /upload → /uploads → createImage (async thumb) → PostgreSQL',
      steps: [
        { title:'Client selects video file', desc:'Web: file input with video/* accept. iOS: PHPickerViewController with video media type.', packages:['p-web','p-ios'], edges:[] },
        { title:'POST /upload', desc:'Client POSTs the video to /upload?deviceId=X. multer accepts mp4/mov/webm/avi up to 2 GB.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'File saved to /uploads', desc:'multer writes the video to /uploads/devices/{deviceId}/{uuid}.mp4 (or original ext). Path returned to client.', packages:['p-api'], edges:['e-api-uploads'] },
        { title:'createImage mutation — DB row created immediately', desc:'Resolver creates the image record instantly (mediaType: VIDEO, no thumbnailPath yet) so the client isn\'t blocked by ffmpeg processing.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Async: ffmpeg generates thumbnail', desc:'setImmediate() runs generateVideoThumbnail() in the background: ffmpeg extracts frame at 1s, sharp converts to 320×320 WebP, ffprobe reads duration. The image row is updated when done.', packages:['p-api'], edges:['e-api-uploads','e-api-db'] }
      ]
    },
    {
      id:'delete-image', icon:'🗑️', name:'Delete Image / Video', path:'Web / iOS → API → PostgreSQL + /uploads',
      steps: [
        { title:'User clicks Delete on image', desc:'deleteImage(id) mutation fired from web device detail Photos tab or iOS Images tab.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'Resolver fetches paths then deletes DB row', desc:'deleteImage resolver reads the image record to get path and thumbnailPath, then calls prisma.image.delete().', packages:['p-api'], edges:['e-api-db'] },
        { title:'Files removed from disk', desc:'fs.unlinkSync() called on both the original file and the WebP thumbnail (if it exists).', packages:['p-api'], edges:['e-api-uploads'] }
      ]
    },
    {
      id:'add-note', icon:'📝', name:'Add Note', path:'Web / iOS / MCP → API → PostgreSQL',
      steps: [
        { title:'Note submitted', desc:'createNote(input) mutation fired from web device detail, iOS Notes tab, or MCP add_note tool.', packages:['p-web','p-ios','p-mcp'], edges:['e-web-api','e-ios-api','e-mcp-api'] },
        { title:'Resolver writes note', desc:'createNote resolver calls prisma.note.create() with content, date (auto-timestamped), and deviceId.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'add-maintenance-task', icon:'🔧', name:'Add Maintenance Task', path:'Web / iOS / MCP → API → PostgreSQL',
      steps: [
        { title:'Task submitted', desc:'createMaintenanceTask(input) mutation fired from web, iOS, or MCP add_maintenance_task tool. Input includes label, dateCompleted, notes, optional cost.', packages:['p-web','p-ios','p-mcp'], edges:['e-web-api','e-ios-api','e-mcp-api'] },
        { title:'Resolver writes task', desc:'prisma.maintenanceTask.create(). The cost field rolls up into totalMaintenanceCost on the financials page.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'login', icon:'🔐', name:'Login', path:'Web / iOS → REST /auth/login → API',
      steps: [
        { title:'User submits password', desc:'Client POSTs { password } to /auth/login. This is a REST endpoint — not GraphQL.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'API validates password', desc:'Express route compares against AUTH_PASSWORD env var using bcrypt. If AUTH_PASSWORD is not set, auth is disabled entirely.', packages:['p-api'], edges:[] },
        { title:'JWT tokens issued', desc:'API returns { accessToken (1h), refreshToken (7d) } signed with JWT_SECRET. Client stores tokens and attaches accessToken as Authorization: Bearer header on subsequent requests.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] }
      ]
    },
    {
      id:'token-refresh', icon:'🔄', name:'Token Refresh', path:'Web / iOS → REST /auth/refresh → API',
      steps: [
        { title:'Client detects expiring access token', desc:'Before the 1-hour access token expires, client POSTs { refreshToken } to /auth/refresh.', packages:['p-web','p-ios'], edges:['e-web-api','e-ios-api'] },
        { title:'API issues new access token', desc:'Express verifies the refresh token against JWT_SECRET and returns a new { accessToken }. Refresh token is not rotated.', packages:['p-api'], edges:[] }
      ]
    },
    {
      id:'bulk-import', icon:'📥', name:'Bulk Import (ZIP)', path:'Web → REST /import → API (async) → PostgreSQL + /uploads',
      steps: [
        { title:'User uploads ZIP file', desc:'Backup page POSTs ZIP to /import (2 GB limit via multer diskStorage to /tmp/imports). Server returns { jobId } immediately — processing is async.', packages:['p-web'], edges:['e-web-api'] },
        { title:'API extracts and validates', desc:'ZIP is unpacked; manifest JSON parsed; device records validated. Errors are collected (fail-collect, not fail-fast) so partial imports succeed.', packages:['p-api'], edges:[] },
        { title:'Images written to /uploads', desc:'Each bundled image extracted to /uploads/devices/{id}/. sharp generates a 320×320 WebP thumbnail per image.', packages:['p-api'], edges:['e-api-uploads'] },
        { title:'Devices upserted to DB', desc:'prisma.device.upsert() called per device. Images inserted via prisma.image.createMany().', packages:['p-api'], edges:['e-api-db'] },
        { title:'Client polls for progress', desc:'Web polls GET /import/progress/:jobId. On completion, result includes { imported, skipped, errors }. Progress bar advances in real-time.', packages:['p-web'], edges:['e-web-api'] }
      ]
    },
    {
      id:'bulk-export', icon:'📤', name:'Bulk Export (ZIP)', path:'Web → REST /export/start → API (async) → Web download',
      steps: [
        { title:'User initiates export', desc:'Backup page POSTs { deviceIds } to /export/start. Server returns { jobId } immediately.', packages:['p-web'], edges:['e-web-api'] },
        { title:'API builds ZIP asynchronously', desc:'API reads device rows and image files from disk, bundles them into a ZIP with a manifest JSON. Progress tracked in exportJobs Map.', packages:['p-api'], edges:['e-api-db','e-api-uploads'] },
        { title:'Client polls progress', desc:'Web polls GET /export/progress/:jobId until status = \'done\'.', packages:['p-web'], edges:['e-web-api'] },
        { title:'Client downloads ZIP', desc:'Browser navigates to GET /export/download/:jobId which streams the assembled ZIP file.', packages:['p-web'], edges:['e-web-api'] }
      ]
    },
    {
      id:'create-journey', icon:'🗺️', name:'Create Journey', path:'Showcase → API → PostgreSQL',
      steps: [
        { title:'Admin fills journey form', desc:'JourneyEditor.tsx fires the createJourney mutation with { title, slug, description, published, sortOrder }.', packages:['p-showcase'], edges:['e-showcase-api'] },
        { title:'Resolver creates journey', desc:'createJourney resolver calls prisma.showcaseJourney.create(). Returns the new journey with its id.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Admin list cache invalidated', desc:'createJourney mutation has refetchQueries: [GET_ALL_SHOWCASE_JOURNEYS_ADMIN] so the journey list reflects the new entry immediately.', packages:['p-showcase'], edges:['e-showcase-api'] },
        { title:'Editor navigates to edit page', desc:'On success, router.push(\'/admin/journeys/{id}\') takes the admin to the full editor where chapters and devices can be added.', packages:['p-showcase'], edges:[] }
      ]
    },
    {
      id:'edit-journey', icon:'✏️', name:'Edit Journey (chapters & devices)', path:'Showcase → API → PostgreSQL',
      steps: [
        { title:'Editor loads journey data', desc:'GET_ALL_JOURNEYS_FOR_EDIT query fetches chapters and their showcase devices via Apollo. Cache-first, network if stale.', packages:['p-showcase'], edges:['e-showcase-api'] },
        { title:'Chapter title/description auto-saves on blur', desc:'ChapterCard.tsx fires upsertChapter mutation on input blur. Creates a new chapter if no id yet; updates if id exists.', packages:['p-showcase'], edges:['e-showcase-api'] },
        { title:'Resolver upserts chapter', desc:'prisma.showcaseChapter.upsert() keyed on id. sortOrder changes from reorder buttons are also persisted here.', packages:['p-api'], edges:['e-api-db'] },
        { title:'Device added to chapter', desc:'DeviceSearchModal fires upsertShowcaseDevice mutation with { chapterId, deviceId, sortOrder, isFeatured }.', packages:['p-showcase'], edges:['e-showcase-api'] },
        { title:'ShowcaseDevice row created', desc:'prisma.showcaseDevice.upsert() links the inventory Device to the chapter. curatorNote and isFeatured can be edited inline.', packages:['p-api'], edges:['e-api-db'] }
      ]
    },
    {
      id:'showcase-export-import', icon:'📦', name:'Showcase Export / Import', path:'Web → REST /showcase/export|import → API → PostgreSQL + /uploads',
      steps: [
        { title:'Admin triggers export or import', desc:'GET /showcase/export streams a ZIP. POST /showcase/import receives a ZIP (up to 2 GB). Both endpoints require auth.', packages:['p-web'], edges:['e-web-api'] },
        { title:'Export: ZIP built from DB + uploads', desc:'API reads all journeys, chapters, and showcase devices from DB. Active showcase images are bundled into the ZIP.', packages:['p-api'], edges:['e-api-db','e-api-uploads'] },
        { title:'Import: ZIP extracted, DB upserted', desc:'Import unpacks ZIP, parses manifest, upserts journeys/chapters/devices by slug. Images written to /uploads. Missing inventory devices are silently skipped.', packages:['p-api'], edges:['e-api-db','e-api-uploads'] }
      ]
    },
    {
      id:'ai-query', icon:'🤖', name:'AI Query (Chat)', path:'iOS / Web → OpenAI → MCP Server → API → PostgreSQL',
      steps: [
        { title:'User types or speaks a question', desc:'iOS ChatView (SFSpeechRecognizer for voice input) or web CollectionChat sends the message to OpenAI with the MCP tool list attached.', packages:['p-web','p-ios'], edges:[] },
        { title:'OpenAI selects an MCP tool', desc:'The model chooses from: list_all_devices, search_devices, get_device_details, get_financial_summary, list_devices, update_device, add_note, add_maintenance_task.', packages:['p-mcp'], edges:[] },
        { title:'MCP server calls GraphQL API', desc:'MCP server sends the appropriate GraphQL query or mutation to /graphql using a service JWT. Results serialised and returned as tool output.', packages:['p-mcp','p-api','p-db'], edges:['e-mcp-api','e-api-db'] },
        { title:'OpenAI composes response', desc:'Tool result fed back to OpenAI; model writes a natural-language reply. iOS streams text via AVSpeechSynthesizer if voice mode is on.', packages:['p-web','p-ios'], edges:[] }
      ]
    },
    {
      id:'storefront-browse', icon:'🛍️', name:'Storefront Browse', path:'Storefront → API → PostgreSQL',
      steps: [
        { title:'Next.js SSR page loads', desc:'Storefront server-side fetches devices({ where: { status: FOR_SALE } }) via GraphQL. No auth token — storefront is fully public.', packages:['p-storefront'], edges:['e-store-api'] },

        { title:'API calls OpenAI', desc:'If sourceImageId provided, the source image is converted to PNG and sent as an edit request. Otherwise a new generation is requested. Model is configurable (gpt-image-1.5 or gpt-image-2).', packages:['p-api'], edges:[] },
        { title:'Generated image saved to /uploads', desc:'OpenAI returns base64 image data. API decodes and writes to /uploads/devices/{deviceId}/{uuid}.png.', packages:['p-api'], edges:['e-api-uploads'] },

        { title:'Client polls for completion', desc:'Web polls GET /generate-image/status/:jobId. On completion, the new image appears in the device\'s photo gallery.', packages:['p-web'], edges:['e-web-api'] }

};

// ── State ──────────────────────────────────────────────────────────────────────
var edgeMap = {};
DATA.edges.forEach(function(e) { edgeMap[e.id] = e; });

var selectedFlow = null;
var activeStep   = -1;
var nodeEls      = {};
var badgeEl      = null;

var TIER_COLOR = { client:'#10b981', middleware:'#a855f7', api:'#6366f1', storage:'#f59e0b' };

// ── Init ───────────────────────────────────────────────────────────────────────
function init() {
  badgeEl = document.getElementById('step-badge');
  renderNodes();
  renderFlows();
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      drawAllEdges();
      selectFlow(DATA.flows[0].id);
    });
  });
}

// ── Nodes ──────────────────────────────────────────────────────────────────────
function renderNodes() {
  var container = document.getElementById('diagram-nodes');
  DATA.packages.forEach(function(pkg) {
    var el = document.createElement('div');
    el.className = 'pkg-node';
    el.id = 'node-' + pkg.id;
    el.style.left = pkg.x + '%';
    el.style.top  = pkg.y + '%';

    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;';

    var dot = document.createElement('span');
    dot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;background:' + (TIER_COLOR[pkg.tier] || '#888');

    var texts = document.createElement('div');

    var name = document.createElement('div');
    name.className = 'pkg-name';
    name.style.cssText = 'font-size:12px;font-weight:600;color:#a1a1aa;line-height:1.2;';
    name.textContent = pkg.name;

    var sub = document.createElement('div');
    sub.style.cssText = 'font-size:10px;color:#3f3f46;margin-top:1px;';
    sub.textContent = pkg.sub;

    texts.appendChild(name);
    texts.appendChild(sub);
    row.appendChild(dot);
    row.appendChild(texts);
    el.appendChild(row);
    container.appendChild(el);
    nodeEls[pkg.id] = el;

    el.addEventListener('mouseenter', function() { previewPackage(pkg.id); });
    el.addEventListener('mouseleave', function() {
      document.querySelectorAll('.step-row').forEach(function(r) { r.classList.remove('pkg-preview'); });
      applyState(selectedFlow, activeStep);
    });
  });
}

// ── Edges ──────────────────────────────────────────────────────────────────────
function getNodeCenter(pkgId) {
  var el = nodeEls[pkgId];
  if (!el) return null;
  var diag = document.getElementById('diagram').getBoundingClientRect();
  var nr   = el.getBoundingClientRect();
  return { x: nr.left + nr.width / 2 - diag.left, y: nr.top + nr.height / 2 - diag.top };
}

function drawAllEdges() {
  var svg = document.getElementById('diagram-svg');
  svg.querySelectorAll('.edge-path').forEach(function(p) { p.remove(); });

  var ns = 'http://www.w3.org/2000/svg';
  DATA.edges.forEach(function(edge) {
    var a = getNodeCenter(edge.from);
    var b = getNodeCenter(edge.to);
    if (!a || !b) return;

    var path = document.createElementNS(ns, 'path');
    path.setAttribute('id', 'edge-' + edge.id);
    path.className.baseVal = 'edge-path';
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#27272a');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('marker-end', 'url(#arr-default)');

    var cx = (a.x + b.x) / 2;
    var cy = (a.y + b.y) / 2;
    path.setAttribute('d', 'M ' + a.x + ' ' + a.y + ' Q ' + cx + ' ' + cy + ' ' + b.x + ' ' + b.y);

    svg.appendChild(path);
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function expandWithEdgeEndpoints(pkgIds, edgeIds) {
  var result = pkgIds.slice();
  edgeIds.forEach(function(eid) {
    var e = edgeMap[eid];
    if (!e) return;
    if (result.indexOf(e.from) < 0) result.push(e.from);
    if (result.indexOf(e.to)   < 0) result.push(e.to);
  });
  return result;
}

function resetEdge(id) {
  var el = document.getElementById('edge-' + id);
  if (!el) return;
  el.classList.remove('edge-anim');
  el.removeAttribute('stroke-dasharray');
  el.removeAttribute('stroke-dashoffset');
  el.setAttribute('stroke', '#27272a');
  el.setAttribute('stroke-width', '1.5');
  el.setAttribute('opacity', '1');
  el.setAttribute('marker-end', 'url(#arr-default)');
}
function setEdgeActive(id) {
  var el = document.getElementById('edge-' + id);
  if (!el) return;
  el.classList.add('edge-anim');
  el.setAttribute('stroke-dasharray', '8 4');
  el.setAttribute('stroke', '#facc15');
  el.setAttribute('stroke-width', '2.5');
  el.setAttribute('opacity', '1');
  el.setAttribute('marker-end', 'url(#arr-active)');
}
function setEdgeFlow(id) {
  var el = document.getElementById('edge-' + id);
  if (!el) return;
  el.classList.remove('edge-anim');
  el.removeAttribute('stroke-dasharray');
  el.setAttribute('stroke', '#52525b');
  el.setAttribute('stroke-width', '1.5');
  el.setAttribute('opacity', '1');
  el.setAttribute('marker-end', 'url(#arr-flow)');
}
function setEdgeDim(id) {
  var el = document.getElementById('edge-' + id);
  if (!el) return;
  el.classList.remove('edge-anim');
  el.removeAttribute('stroke-dasharray');
  el.setAttribute('stroke', '#18181b');
  el.setAttribute('stroke-width', '1.5');
  el.setAttribute('opacity', '0.4');
  el.setAttribute('marker-end', 'url(#arr-dim)');
}

// ── Apply state ────────────────────────────────────────────────────────────────
function applyState(flow, stepIdx) {
  DATA.packages.forEach(function(pkg) {
    var el = nodeEls[pkg.id];
    if (!el) return;
    el.classList.remove('state-active', 'state-dim');
  });
  DATA.edges.forEach(function(edge) { resetEdge(edge.id); });
  badgeEl.style.display = 'none';

  if (!flow) return;

  var allEdgeIds = [];
  var allPkgIds  = [];
  flow.steps.forEach(function(s) {
    (s.packages || []).forEach(function(p) { if (allPkgIds.indexOf(p)  < 0) allPkgIds.push(p);  });
    (s.edges    || []).forEach(function(e) { if (allEdgeIds.indexOf(e) < 0) allEdgeIds.push(e); });
  });
  allPkgIds = expandWithEdgeEndpoints(allPkgIds, allEdgeIds);

  var activePkgIds, activeEdgeIds;
  if (stepIdx >= 0 && flow.steps[stepIdx]) {
    activePkgIds  = (flow.steps[stepIdx].packages || []).slice();
    activeEdgeIds = (flow.steps[stepIdx].edges    || []).slice();
  } else {
    activePkgIds  = allPkgIds.slice();
    activeEdgeIds = allEdgeIds.slice();
  }
  activePkgIds = expandWithEdgeEndpoints(activePkgIds, activeEdgeIds);

  DATA.packages.forEach(function(pkg) {
    var el = nodeEls[pkg.id];
    if (!el) return;
    if (activePkgIds.indexOf(pkg.id) >= 0)       el.classList.add('state-active');
    else if (allPkgIds.indexOf(pkg.id) < 0)       el.classList.add('state-dim');
  });

  DATA.edges.forEach(function(edge) {
    var inFlow = allEdgeIds.indexOf(edge.id) >= 0;
    var active = activeEdgeIds.indexOf(edge.id) >= 0;
    if (active)       setEdgeActive(edge.id);
    else if (inFlow)  setEdgeFlow(edge.id);
    else              setEdgeDim(edge.id);
  });

  if (stepIdx >= 0 && activeEdgeIds.length > 0) {
    var eid = activeEdgeIds[0];
    var e   = edgeMap[eid];
    if (e) {
      var a = getNodeCenter(e.from);
      var b = getNodeCenter(e.to);
      if (a && b) {
        badgeEl.style.left    = ((a.x + b.x) / 2 - 10) + 'px';
        badgeEl.style.top     = ((a.y + b.y) / 2 - 10) + 'px';
        badgeEl.style.display = 'flex';
        badgeEl.textContent   = stepIdx + 1;
      }
    }
  }
}

// ── Package hover ──────────────────────────────────────────────────────────────
function previewPackage(pkgId) {
  if (!selectedFlow) return;

  var allEdgeIds = [];
  var allPkgIds  = [];
  selectedFlow.steps.forEach(function(s) {
    (s.packages || []).forEach(function(p) { if (allPkgIds.indexOf(p)  < 0) allPkgIds.push(p);  });
    (s.edges    || []).forEach(function(e) { if (allEdgeIds.indexOf(e) < 0) allEdgeIds.push(e); });
  });
  allPkgIds = expandWithEdgeEndpoints(allPkgIds, allEdgeIds);

  var connectedEdgeIds = allEdgeIds.filter(function(eid) {
    var e = edgeMap[eid];
    return e && (e.from === pkgId || e.to === pkgId);
  });
  var activePkgIds = expandWithEdgeEndpoints([pkgId], connectedEdgeIds);

  DATA.packages.forEach(function(pkg) {
    var el = nodeEls[pkg.id];
    if (!el) return;
    el.classList.remove('state-active', 'state-dim');
    if (activePkgIds.indexOf(pkg.id) >= 0)  el.classList.add('state-active');
    else if (allPkgIds.indexOf(pkg.id) < 0) el.classList.add('state-dim');
  });

  DATA.edges.forEach(function(edge) {
    var inFlow = allEdgeIds.indexOf(edge.id) >= 0;
    var active = connectedEdgeIds.indexOf(edge.id) >= 0;
    if (active)       setEdgeActive(edge.id);
    else if (inFlow)  setEdgeFlow(edge.id);
    else              setEdgeDim(edge.id);
  });

  badgeEl.style.display = 'none';

  document.querySelectorAll('.step-row').forEach(function(r) {
    var idx  = parseInt(r.getAttribute('data-step-index'), 10);
    var step = selectedFlow.steps[idx];
    var match = step && (
      (step.packages || []).indexOf(pkgId) >= 0 ||
      (step.edges    || []).some(function(eid) {
        var e = edgeMap[eid];
        return e && (e.from === pkgId || e.to === pkgId);
      })
    );
    if (match) r.classList.add('pkg-preview');
    else        r.classList.remove('pkg-preview');
  });
}

// ── Flow list ──────────────────────────────────────────────────────────────────
function renderFlows() {
  var container = document.getElementById('flows-list');
  DATA.flows.forEach(function(flow) {
    var item = document.createElement('div');
    item.className = 'flow-item';
    item.setAttribute('data-flow-id', flow.id);
    item.style.cssText = 'padding:7px 10px;display:flex;align-items:center;gap:8px;';

    var icon = document.createElement('span');
    icon.style.cssText = 'font-size:13px;flex-shrink:0;';
    icon.textContent = flow.icon || '▸';

    var info = document.createElement('div');
    info.style.cssText = 'min-width:0;flex:1;';

    var name = document.createElement('div');
    name.className = 'flow-name';
    name.style.cssText = 'font-size:12px;font-weight:500;color:#a1a1aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    name.textContent = flow.name;

    var path = document.createElement('div');
    path.className = 'flow-path';
    path.style.cssText = 'font-size:10px;color:#3f3f46;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;';
    path.textContent = flow.path;

    info.appendChild(name);
    info.appendChild(path);
    item.appendChild(icon);
    item.appendChild(info);
    container.appendChild(item);

    item.addEventListener('mouseenter', function() {
      if (!selectedFlow || selectedFlow.id !== flow.id) applyState(flow, -1);
    });
    item.addEventListener('mouseleave', function() {
      applyState(selectedFlow, activeStep);
    });
    item.addEventListener('click', function() { selectFlow(flow.id); });
  });
}

function selectFlow(id) {
  selectedFlow = DATA.flows.find(function(f) { return f.id === id; }) || null;
  activeStep   = -1;

  document.querySelectorAll('.flow-item').forEach(function(el) {
    if (el.getAttribute('data-flow-id') === id) el.classList.add('selected');
    else el.classList.remove('selected');
  });

  var titleEl = document.getElementById('flow-title');
  titleEl.textContent = selectedFlow ? selectedFlow.icon + ' ' + selectedFlow.name : '';

  renderSteps(selectedFlow);
  applyState(selectedFlow, activeStep);
}

// ── Step list ──────────────────────────────────────────────────────────────────
function renderSteps(flow) {
  var container = document.getElementById('steps-list');
  while (container.firstChild) container.removeChild(container.firstChild);

  if (!flow || !flow.steps.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'color:#52525b;font-size:12px;font-style:italic;';
    empty.textContent = 'No steps defined.';
    container.appendChild(empty);
    return;
  }

  flow.steps.forEach(function(step, i) {
    container.appendChild(buildStepRow(step, i));
  });
}

function buildStepRow(step, i) {
  var row = document.createElement('div');
  row.className = 'step-row' + (i === activeStep ? ' active' : '');
  row.setAttribute('data-step-index', i);
  row.style.cssText = 'padding:8px 10px;margin-bottom:2px;';

  var inner = document.createElement('div');
  inner.style.cssText = 'display:flex;gap:10px;align-items:flex-start;';

  var num = document.createElement('div');
  num.className = 'step-num';
  num.style.cssText = 'width:20px;height:20px;border-radius:50%;border:1.5px solid #3f3f46;color:#52525b;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;';
  num.textContent = i + 1;

  var body = document.createElement('div');
  body.style.cssText = 'flex:1;min-width:0;';

  var title = document.createElement('div');
  title.className = 'step-title';
  title.style.cssText = 'font-size:11px;font-weight:600;color:#71717a;line-height:1.3;';
  title.textContent = step.title;

  var desc = document.createElement('div');
  desc.style.cssText = 'font-size:10px;color:#3f3f46;line-height:1.5;margin-top:3px;';
  desc.textContent = step.desc;

  body.appendChild(title);
  body.appendChild(desc);
  inner.appendChild(num);
  inner.appendChild(body);
  row.appendChild(inner);

  row.addEventListener('mouseenter', function() {
    if (activeStep !== i) applyState(selectedFlow, i);
  });
  row.addEventListener('mouseleave', function() {
    applyState(selectedFlow, activeStep);
  });
  row.addEventListener('click', function() {
    activeStep = i;
    document.querySelectorAll('.step-row').forEach(function(r) {
      if (parseInt(r.getAttribute('data-step-index'), 10) === i) r.classList.add('active');
      else r.classList.remove('active');
    });
    applyState(selectedFlow, activeStep);
  });

  return row;
}

// ── Boot ───────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
